<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login</title>

<style>

/* BACKGROUND */
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #063241, #2c5364);
  color: white;
}

/* LOGIN CARD */
.login-box {
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5);
  width: 300px;
  text-align: center;
  animation: fadeIn 0.8s ease-in-out;
}

/* TITLE */
.login-box h2 {
  margin-bottom: 20px;
}

/* INPUT */
.login-box input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 14px;
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 30px;
  font-weight: bold;
  color: white;
  cursor: pointer;
  background: linear-gradient(135deg, #00c6ff, #0072ff);
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}

/* HOVER */
.login-btn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 15px rgba(0,114,255,0.7);
}

/* CLICK */
.login-btn:active {
  transform: scale(0.95);
}

/* SHINE EFFECT */
.login-btn::before {
  content: "";
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  transition: 0.5s;
}

.login-btn:hover::before {
  left: 100%;
}

/* ERROR TEXT */
#error {
  color: #ff4d4d;
  margin-top: 10px;
  font-size: 14px;
}

/* ANIMATION */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

</style>

</head>

<body>

<div class="login-box">

  <h2>🔐 Admin Login</h2>

  <input id="email" placeholder="Enter Email">
  <input id="password" type="password" placeholder="Enter Password">

  <button class="login-btn" onclick="login()">Login 🚀</button>

  <div id="error"></div>

</div>

<script>

function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const error = document.getElementById("error");

  if (email === "admin@gmail.com" && password === "1234") {
    localStorage.setItem("auth", "true");

    // SUCCESS ANIMATION
    document.querySelector(".login-box").innerHTML = "<h2>✅ Login Successful</h2>";

    setTimeout(() => {
      window.location.href = "finances.html";
    }, 1000);

  } else {
    error.innerText = "❌ Invalid email or password";
  }
}

</script>

</body>
</html>
